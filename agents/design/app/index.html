<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fila do Curador — OverCore</title>
<style>
  /* APP VIVA · fiel ao refinado aprovado · 100% tokens do DESIGN.md */
  :root{
    --bg:#0b0d12; --panel:#12151d; --panel-2:#171b26; --line:#242a36;
    --ink:#e8ebf2; --dim:#8b93a7; --accent:#c8ff3d;
    --ok:#4ade80; --warn:#fbbf24; --err:#f87171;
    --radius:18px; --radius-s:10px; --dur-micro:100ms; --ease:cubic-bezier(.4,0,.2,1);
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px; margin:0 auto; padding:28px 24px 64px}
  .mono{font-family:ui-monospace,Consolas,monospace}
  header{display:flex; justify-content:space-between; align-items:center; margin-bottom:20px}
  .kicker{font-size:12px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); font-weight:700}
  h1{font-size:25px; font-weight:700; letter-spacing:-.02em; margin:2px 0 0}
  .actions{display:flex; gap:8px}
  .btn{font:600 13px/1 inherit; padding:9px 14px; border-radius:var(--radius-s); cursor:pointer;
    transition:background var(--dur-micro) var(--ease); border:1px solid var(--line); background:var(--panel); color:var(--ink)}
  .btn:hover{background:var(--panel-2)}
  .btn.primary{background:var(--accent); border-color:var(--accent); color:#0b0d12}
  .btn.primary:hover{filter:brightness(1.06)}
  .btn:focus-visible{outline:2px solid var(--accent); outline-offset:2px}
  .btn[disabled]{opacity:.55; cursor:default}
  .spin{display:inline-block; width:12px; height:12px; border-radius:999px; vertical-align:-1px; margin-right:7px;
    border:2px solid rgba(11,13,18,.35); border-top-color:#0b0d12; animation:sp .8s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}

  .stats{display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:16px}
  @media(max-width:800px){.stats{grid-template-columns:repeat(2,1fr)}}
  .stat{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:14px 16px}
  .stat .n{font-size:31px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:-.02em; min-height:1.1em}
  .stat .l{font-size:12px; color:var(--dim); margin-top:2px}

  .split{display:grid; grid-template-columns:2fr 1fr; gap:12px; align-items:start}
  @media(max-width:800px){.split{grid-template-columns:1fr}}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); overflow:hidden}
  .card h2{font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--dim);
    font-weight:600; margin:0; padding:12px 16px; border-bottom:1px solid var(--line)}
  table{width:100%; border-collapse:collapse; font-size:13px}
  th{font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:var(--dim); font-weight:600;
    text-align:left; padding:10px 12px; border-bottom:1px solid var(--line)}
  td{padding:11px 12px; border-bottom:1px solid var(--line); vertical-align:middle}
  tr:last-child td{border-bottom:none}
  tbody tr{transition:background var(--dur-micro) var(--ease)}
  tbody tr:hover{background:var(--panel-2)}
  .id{color:var(--dim)}
  .title{max-width:330px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .origin{font-size:12px; color:var(--dim)}
  .state{display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600}
  .state::before{content:""; width:7px; height:7px; border-radius:999px; background:currentColor}
  .state.ok{color:var(--ok)} .state.warn{color:var(--warn)} .state.err{color:var(--err)}
  .rowact{font-size:12px; color:var(--ink); text-decoration:none; border-bottom:1px solid var(--accent); padding-bottom:1px}

  .side .card{margin-bottom:12px}
  .list{list-style:none; margin:0; padding:6px 0}
  .list li{display:flex; justify-content:space-between; gap:10px; padding:9px 16px; font-size:13px}
  .list li + li{border-top:1px solid var(--line)}
  .list .meta{color:var(--dim); font-size:12px; white-space:nowrap}

  /* peças das artesãs — agora FUNCIONAIS */
  .sk{position:relative; overflow:hidden; background:var(--panel-2); border-radius:6px; height:12px}
  .sk::after{content:""; position:absolute; inset:0; transform:translateX(-100%);
    background:linear-gradient(90deg,transparent,rgba(232,235,242,.06),transparent);
    animation:sh 1.4s var(--ease) infinite}
  @keyframes sh{to{transform:translateX(100%)}}
  .feedback{padding:22px 16px; text-align:center}
  .feedback p{margin:2px 0; font-weight:600}
  .feedback span{font-size:12.5px; color:var(--dim)}
  .feedback.err p{color:var(--err)}
  .feedback .btn{margin-top:12px; font-size:12px; padding:7px 12px}

  #saida{display:none; margin-top:16px}
  #saida pre{margin:0; padding:14px 16px; font-size:12px; line-height:1.5; color:var(--dim);
    white-space:pre-wrap; max-height:220px; overflow:auto}
  footer{margin-top:26px; font-size:12px; color:var(--dim); display:flex; justify-content:space-between}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <div class="kicker">OverCore · Curadoria</div>
      <h1>Fila do Curador</h1>
    </div>
    <div class="actions">
      <button class="btn" id="btn-atualizar">Atualizar</button>
      <button class="btn primary" id="btn-ciclo">Rodar ciclo</button>
    </div>
  </header>

  <div class="stats" id="stats">
    <div class="stat"><div class="n" data-k="abertas"><div class="sk" style="width:42px"></div></div><div class="l">contribuições abertas</div></div>
    <div class="stat"><div class="n" data-k="aguardando"><div class="sk" style="width:42px"></div></div><div class="l">aguardando juiz</div></div>
    <div class="stat"><div class="n" data-k="promovidas"><div class="sk" style="width:42px"></div></div><div class="l">promovidas</div></div>
    <div class="stat"><div class="n" data-k="indice"><div class="sk" style="width:64px"></div></div><div class="l">skills no índice</div></div>
  </div>

  <div class="split">
    <div class="card">
      <h2>Fila de contribuições</h2>
      <div id="fila-body">
        <table><thead><tr><th>#</th><th>Título</th><th>Origem</th><th>Estado</th><th></th></tr></thead>
        <tbody id="fila">
          <tr><td class="id"><div class="sk" style="width:28px"></div></td><td><div class="sk" style="width:88%"></div></td><td><div class="sk" style="width:70px"></div></td><td><div class="sk" style="width:96px"></div></td><td><div class="sk" style="width:52px"></div></td></tr>
          <tr><td class="id"><div class="sk" style="width:28px"></div></td><td><div class="sk" style="width:72%"></div></td><td><div class="sk" style="width:70px"></div></td><td><div class="sk" style="width:96px"></div></td><td><div class="sk" style="width:52px"></div></td></tr>
          <tr><td class="id"><div class="sk" style="width:28px"></div></td><td><div class="sk" style="width:80%"></div></td><td><div class="sk" style="width:70px"></div></td><td><div class="sk" style="width:96px"></div></td><td><div class="sk" style="width:52px"></div></td></tr>
        </tbody></table>
      </div>
    </div>

    <div class="side">
      <div class="card">
        <h2>Últimas promovidas</h2>
        <ul class="list" id="promovidas">
          <li><div class="sk" style="width:60%"></div></li>
          <li><div class="sk" style="width:52%"></div></li>
        </ul>
      </div>
      <div class="card">
        <h2>Saúde do hub</h2>
        <ul class="list" id="saude">
          <li><div class="sk" style="width:70%"></div></li>
          <li><div class="sk" style="width:55%"></div></li>
        </ul>
      </div>
    </div>
  </div>

  <div class="card" id="saida"><h2>Saída do ciclo</h2><pre id="saida-pre"></pre></div>

  <footer>
    <span id="rodape">carregando…</span>
    <span>Atelier · OverCore</span>
  </footer>
</div>

<script>
const $=s=>document.querySelector(s);
const esc=t=>String(t).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function carregar(){
  try{
    const r=await fetch('/api/estado'); if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json(); render(d);
  }catch(e){
    $('#fila-body').innerHTML=
      '<div class="feedback err"><p>Não consegui falar com o servidor.</p>'+
      '<span>Os dados locais continuam válidos — só não estão frescos.</span><br>'+
      '<button class="btn" onclick="carregar()">Tentar de novo</button></div>';
    $('#rodape').textContent='erro ao carregar — '+esc(e.message);
  }
}

function render(d){
  for(const [k,v] of Object.entries(d.stats))
    document.querySelectorAll(`[data-k="${k}"]`).forEach(el=>el.textContent=Number(v).toLocaleString('pt-BR'));

  if(!d.fila.length){
    $('#fila-body').innerHTML='<div class="feedback"><p>Fila limpa.</p><span>Nenhuma contribuição aguardando — o padrão agradece.</span></div>';
  }else{
    $('#fila-body').innerHTML='<table><thead><tr><th>#</th><th>Título</th><th>Origem</th><th>Estado</th><th></th></tr></thead><tbody>'+
      d.fila.map(f=>`<tr>
        <td class="id mono">#${f.n}</td>
        <td class="title" title="${esc(f.titulo)}">${esc(f.titulo)}</td>
        <td class="origin">${esc(f.origem)}</td>
        <td><span class="state ${f.cor}">${esc(f.estado)}</span></td>
        <td><a class="rowact" href="${esc(f.acao.url)}" target="_blank" rel="noopener">${esc(f.acao.label)}</a></td>
      </tr>`).join('')+'</tbody></table>';
  }

  $('#promovidas').innerHTML=d.promovidas.length
    ? d.promovidas.map(p=>`<li><span class="mono">${esc(p.skill)}</span><span class="meta">via ${esc(p.via)} · ${esc(p.data)}</span></li>`).join('')
    : '<li><span class="meta">nenhuma ainda — a primeira é a mais difícil</span></li>';

  $('#saude').innerHTML=
    `<li>Último ciclo <span class="meta">${esc(d.saude.ultimo_ciclo)}</span></li>`+
    `<li>PRs abertos <span class="meta">${d.saude.pr_count}${d.saude.prs.map(p=>' · #'+p.n).join('')}</span></li>`;

  $('#rodape').textContent=`dados vivos de ${d.repo} · atualizado ${d.gerado_em}`;
}

$('#btn-atualizar').addEventListener('click',carregar);

$('#btn-ciclo').addEventListener('click',async ev=>{
  const b=ev.currentTarget;
  b.disabled=true; b.innerHTML='<span class="spin"></span>Rodando ciclo…';
  try{
    const r=await fetch('/api/ciclo',{method:'POST'});
    const d=await r.json();
    $('#saida').style.display='block';
    $('#saida-pre').textContent=d.saida;
    await carregar();
  }catch(e){
    $('#saida').style.display='block';
    $('#saida-pre').textContent='falha ao rodar o ciclo: '+e.message;
  }finally{
    b.disabled=false; b.textContent='Rodar ciclo';
  }
});

carregar();
</script>
</body>
</html>
