<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Sede da OverCore — croqui 3D do cenário</title>
<style>
  :root{--bg:#0b0d12; --line:#242a36; --ink:#e8ebf2; --dim:#8b93a7; --accent:#c8ff3d; --ease:cubic-bezier(.4,0,.2,1)}
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100svh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden}
  nav{display:flex; justify-content:space-between; align-items:center; padding:14px 24px;
    border-bottom:1px solid var(--line); z-index:2}
  .logo{font-weight:800; font-size:15px; text-decoration:none; color:var(--ink)}
  .logo b{color:var(--accent)}
  .tag2{font-size:12px; color:var(--dim)}
  main{flex:1; position:relative}
  canvas{display:block; width:100%; height:100%; touch-action:none; cursor:grab}
  canvas.grab{cursor:grabbing}
  .hud{position:absolute; left:0; right:0; bottom:14px; text-align:center; font-size:12.5px;
    color:var(--dim); pointer-events:none; z-index:2}
  .hud b{color:var(--accent)}
  .badge{position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:2;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase; font-weight:700; color:#fbbf24;
    border:1px solid rgba(251,191,36,.35); background:rgba(251,191,36,.08); border-radius:999px; padding:5px 12px}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">Over<b>Core</b> <span class="tag2">· experimento 002 — a sede (croqui do cenário)</span></a>
  <span class="tag2">arraste pra orbitar · role pra aproximar</span>
</nav>
<main>
  <span class="badge">croqui 3D — volumes de estudo, sem acabamento</span>
  <canvas id="cv" aria-label="croqui 3D da sede da OverCore"></canvas>
  <div class="hud"><b>arraste</b> pra orbitar a sede · <b>scroll</b> aproxima · avalie posições e proporções — o acabamento vem depois do seu ok</div>
</main>

<script src="../agents/design/showcase/vendor/three.min.js"></script>
<script>
const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
const cv=document.getElementById('cv');
let renderer;
try{ renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true}) }
catch(e){ cv.replaceWith(Object.assign(document.createElement('p'),{textContent:'Sem WebGL por aqui — o croqui fica pra próxima máquina.',style:'text-align:center;color:#8b93a7;padding:60px'})) }

if(renderer){
  const main=cv.parentElement;
  const W=()=>main.clientWidth, H=()=>main.clientHeight;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W(),H(),false);
  renderer.setClearColor(0x0b0d12);
  const scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0x0b0d12, 18, 46);
  const cam=new THREE.PerspectiveCamera(46, W()/H(), .1, 120);

  /* luzes da casa */
  scene.add(new THREE.AmbientLight(0x6a7590,.5));
  const key=new THREE.DirectionalLight(0xc8ff3d,.5); key.position.set(6,12,8); scene.add(key);
  const fill=new THREE.DirectionalLight(0x516cb1,.55); fill.position.set(-8,6,-6); scene.add(fill);
  const coreGlow=new THREE.PointLight(0xc8ff3d,.9,18); coreGlow.position.set(0,1.2,0); scene.add(coreGlow);

  const DARK=0x151a26, PANEL=0x1b2130, LIME=0xc8ff3d;
  const matDark=new THREE.MeshStandardMaterial({color:DARK, metalness:.7, roughness:.45});
  const matPanel=new THREE.MeshStandardMaterial({color:PANEL, metalness:.55, roughness:.55});
  const matBlock=new THREE.MeshStandardMaterial({color:0x232b3c, metalness:.4, roughness:.7});
  const matLime=new THREE.MeshStandardMaterial({color:LIME, emissive:LIME, emissiveIntensity:1.1});

  /* ===== plataforma ===== */
  const platform=new THREE.Group(); scene.add(platform);
  const disc=new THREE.Mesh(new THREE.CylinderGeometry(9.4, 8.6, .7, 64), matDark);
  disc.position.y=-.35; platform.add(disc);
  const rim=new THREE.Mesh(new THREE.TorusGeometry(9.4,.09,10,80), matLime.clone());
  rim.material.emissiveIntensity=.5; rim.rotation.x=Math.PI/2; rim.position.y=0; platform.add(rim);
  // juntas do piso (anéis sutis)
  [3.2,5.4,7.6].forEach(r=>{
    const ring=new THREE.Mesh(new THREE.TorusGeometry(r,.015,6,72),
      new THREE.MeshBasicMaterial({color:0x2a3244}));
    ring.rotation.x=Math.PI/2; ring.position.y=.011; platform.add(ring);
  });

  /* ===== torre central + núcleo ===== */
  const tower=new THREE.Group(); platform.add(tower);
  const desk=new THREE.Mesh(new THREE.CylinderGeometry(1.5,1.7,.9,32), matPanel);
  desk.position.y=.45; tower.add(desk);
  const nucleo=new THREE.Mesh(new THREE.IcosahedronGeometry(.62,0), matLime);
  nucleo.position.y=1.75; tower.add(nucleo);
  // monitores flutuantes do Router
  for(let i=0;i<3;i++){
    const m=new THREE.Mesh(new THREE.BoxGeometry(1.05,.62,.05), matBlock);
    const a=-0.5+i*0.5;
    m.position.set(Math.sin(a)*1.35, 1.35, Math.cos(a)*1.35);
    m.lookAt(0,1.35,0); m.rotateY(Math.PI);
    tower.add(m);
  }

  /* ===== rótulos (sprites que encaram a câmera) ===== */
  function label(text, accent){
    const c=document.createElement('canvas'); c.width=512; c.height=128;
    const x=c.getContext('2d');
    x.fillStyle='rgba(11,13,18,.78)';
    x.beginPath(); x.roundRect(64,20,384,88,22); x.fill();
    x.strokeStyle=accent; x.lineWidth=3; x.stroke();
    x.fillStyle='#e8ebf2'; x.font='700 44px Inter, sans-serif'; x.textAlign='center'; x.textBaseline='middle';
    x.fillText(text,256,66);
    const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c), transparent:true}));
    sp.scale.set(2.6,.65,1);
    return sp;
  }

  /* ===== estações (blockout: volumes simples + rótulo + linha de circuito) ===== */
  const R=6.4;
  const ESTACOES=[
    { nome:'Quadro · Plan',       ang:-150, acc:'#a78bfa', build:g=>{ // quadro branco
        const q=new THREE.Mesh(new THREE.BoxGeometry(1.7,1.1,.08), matBlock); q.position.y=1.15; g.add(q);
        const pe=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,1.1,8), matPanel); pe.position.y=.55; g.add(pe); } },
    { nome:'Ateliê · Design',     ang:-105, acc:'#f472b6', build:g=>{ // cavalete
        const tela=new THREE.Mesh(new THREE.BoxGeometry(1.1,1.3,.07), matBlock); tela.position.y=1.2; tela.rotation.x=-.12; g.add(tela);
        [-1,1].forEach(s=>{ const p=new THREE.Mesh(new THREE.CylinderGeometry(.045,.045,1.6,8), matPanel);
          p.position.set(s*.4,.8,.18); p.rotation.z=s*.16; g.add(p); }); } },
    { nome:'Bancada · Code',      ang:-60,  acc:'#22d3ee', build:g=>{ // mesa + 2 monitores
        const mesa=new THREE.Mesh(new THREE.BoxGeometry(1.8,.1,.9), matPanel); mesa.position.y=.85; g.add(mesa);
        [-1,1].forEach(s=>{ const mo=new THREE.Mesh(new THREE.BoxGeometry(.8,.5,.05), matBlock);
          mo.position.set(s*.45,1.35,-.15); mo.rotation.y=s*-.2; g.add(mo); });
        [-.7,.7].forEach(x=>{ const pe=new THREE.Mesh(new THREE.BoxGeometry(.08,.85,.08), matPanel); pe.position.set(x,.42,0); g.add(pe); }); } },
    { nome:'Validação',           ang:60,   acc:'#4ade80', build:g=>{ // bancada + semáforo
        const mesa=new THREE.Mesh(new THREE.BoxGeometry(1.5,.75,.8), matPanel); mesa.position.y=.375; g.add(mesa);
        const poste=new THREE.Mesh(new THREE.CylinderGeometry(.05,.05,1.1,8), matPanel); poste.position.set(.55,1.3,0); g.add(poste);
        ['#f87171','#fbbf24','#4ade80'].forEach((c,i)=>{
          const l=new THREE.Mesh(new THREE.SphereGeometry(.09,12,10),
            new THREE.MeshStandardMaterial({color:c, emissive:c, emissiveIntensity:i===1?.9:.15}));
          l.position.set(.55,1.72-i*.24,0); g.add(l); }); } },
    { nome:'Cofre · SafeGate',    ang:105,  acc:'#f87171', build:g=>{ // cofre
        const cofre=new THREE.Mesh(new THREE.BoxGeometry(1.3,1.6,1.1), matBlock); cofre.position.y=.8; g.add(cofre);
        const rod=new THREE.Mesh(new THREE.TorusGeometry(.28,.05,8,24), matPanel);
        rod.position.set(0,.9,.58); g.add(rod); } },
    { nome:'Biblioteca · Curator',ang:150,  acc:'#60a5fa', build:g=>{ // estante + caixinhas
        const est=new THREE.Mesh(new THREE.BoxGeometry(1.9,1.7,.45), matBlock); est.position.y=.85; g.add(est);
        for(let i=0;i<6;i++){
          const cx=new THREE.Mesh(new THREE.BoxGeometry(.22,.22,.22), matLime.clone());
          cx.material.emissiveIntensity=.5;
          cx.position.set(-.65+(i%3)*.65, .55+Math.floor(i/3)*.55, .28); g.add(cx); } } },
    { nome:'Observatório · Research', ang:180, acc:'#2dd4bf', build:g=>{ // telescópio pra fora
        const base=new THREE.Mesh(new THREE.CylinderGeometry(.35,.45,.5,16), matPanel); base.position.y=.25; g.add(base);
        const tubo=new THREE.Mesh(new THREE.CylinderGeometry(.14,.18,1.4,14), matBlock);
        tubo.position.y=1.0; tubo.rotation.x=-.9; tubo.position.z=-.3; g.add(tubo); } },
  ];
  const linhas=[];
  ESTACOES.forEach(e=>{
    const g=new THREE.Group();
    const a=e.ang*Math.PI/180;
    g.position.set(Math.sin(a)*R, 0, Math.cos(a)*R);
    g.lookAt(0,0,0);
    e.build(g);
    const lb=label(e.nome, e.acc); lb.position.y=2.35; g.add(lb);
    // linha de circuito no piso: do núcleo à estação (pulsa no futuro, quando o agente trabalhar)
    const len=R-1.9;
    const linha=new THREE.Mesh(new THREE.BoxGeometry(.06,.012,len),
      new THREE.MeshBasicMaterial({color:LIME, transparent:true, opacity:.28}));
    linha.position.set(Math.sin(a)*(1.9+len/2), .02, Math.cos(a)*(1.9+len/2));
    linha.rotation.y=a;
    platform.add(linha); linhas.push(linha);
    platform.add(g);
  });

  /* ===== letreiro OVERCORE ===== */
  const lc=document.createElement('canvas'); lc.width=1024; lc.height=192;
  const lx=lc.getContext('2d');
  lx.fillStyle='#e8ebf2'; lx.font='800 130px Inter, sans-serif'; lx.textAlign='center'; lx.textBaseline='middle';
  lx.fillText('OVER',380,96);
  lx.fillStyle='#c8ff3d'; lx.fillText('CORE',740,96);
  const letreiro=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(lc), transparent:true}));
  letreiro.scale.set(7.5,1.4,1); letreiro.position.set(0,5.6,0); scene.add(letreiro);

  /* ===== entorno: estrelas + mar de pontos sob a plataforma ===== */
  const starGeo=new THREE.BufferGeometry();
  const starPos=new Float32Array(600*3);
  for(let i=0;i<600;i++){
    const r2=26+Math.random()*30, th=Math.random()*Math.PI*2, ph=Math.acos(2*Math.random()-1);
    starPos[i*3]=r2*Math.sin(ph)*Math.cos(th);
    starPos[i*3+1]=Math.abs(r2*Math.cos(ph))*.6-4;
    starPos[i*3+2]=r2*Math.sin(ph)*Math.sin(th);
  }
  starGeo.setAttribute('position', new THREE.BufferAttribute(starPos,3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x39435a, size:.09})));
  const COLS=70, ROWS=70, SP=.62;
  const seaGeo=new THREE.BufferGeometry();
  const seaPos=new Float32Array(COLS*ROWS*3);
  let k=0;
  for(let i=0;i<COLS;i++)for(let j=0;j<ROWS;j++){
    seaPos[k++]=(i-COLS/2)*SP; seaPos[k++]=0; seaPos[k++]=(j-ROWS/2)*SP;
  }
  seaGeo.setAttribute('position', new THREE.BufferAttribute(seaPos,3));
  const sea=new THREE.Points(seaGeo, new THREE.PointsMaterial({color:0x232c3e, size:.05, transparent:true, opacity:.8}));
  sea.position.y=-4.2; scene.add(sea);

  /* ===== câmera orbital ===== */
  let camA=0.0, camEl=0.42, camR=17, dragging=false, lx2=0, ly2=0;
  cv.addEventListener('pointerdown',e=>{dragging=true; lx2=e.clientX; ly2=e.clientY; cv.classList.add('grab')});
  window.addEventListener('pointermove',e=>{
    if(!dragging)return;
    camA+=(e.clientX-lx2)*.005; camEl=Math.min(1.2,Math.max(.12,camEl+(e.clientY-ly2)*.003));
    lx2=e.clientX; ly2=e.clientY;
  });
  window.addEventListener('pointerup',()=>{dragging=false; cv.classList.remove('grab')});
  cv.addEventListener('wheel',e=>{e.preventDefault(); camR=Math.min(28,Math.max(9,camR+e.deltaY*.012))},{passive:false});
  addEventListener('resize',()=>{cam.aspect=W()/H(); cam.updateProjectionMatrix(); renderer.setSize(W(),H(),false)});

  const p=seaGeo.attributes.position;
  function frame(tms){
    const tt=tms*0.001;
    if(!dragging && !reduced) camA+=0.0011;         // deriva lenta até você pegar o controle
    cam.position.set(Math.sin(camA)*camR*Math.cos(camEl), Math.sin(camEl)*camR, Math.cos(camA)*camR*Math.cos(camEl));
    cam.lookAt(0,.8,0);
    nucleo.rotation.y=tt*.6;
    nucleo.scale.setScalar(1+Math.sin(tt*2.2)*.06);
    coreGlow.intensity=.8+Math.sin(tt*2.2)*.25;
    linhas.forEach((l,i)=>{ l.material.opacity=.2+Math.sin(tt*1.6+i*1.3)*.1 });
    let k2=1;
    for(let i=0;i<COLS;i++)for(let j=0;j<ROWS;j++){
      const x=(i-COLS/2)*SP, z=(j-ROWS/2)*SP;
      p.array[k2]=Math.sin(x*.5+tt*1.6)*.28+Math.cos(z*.6+tt*1.1)*.22;
      k2+=3;
    }
    p.needsUpdate=true;
    renderer.render(scene,cam);
    if(!reduced) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
