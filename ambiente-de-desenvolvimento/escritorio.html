<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A Sede da OverCore — chão plano com textura pintada (técnica do folio)</title>
<style>
  :root{--bg:#0b0d12; --line:#242a36; --ink:#e8ebf2; --dim:#8b93a7; --accent:#c8ff3d}
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    min-height:100svh; display:flex; flex-direction:column; -webkit-font-smoothing:antialiased; overflow:hidden}
  nav{display:flex; justify-content:space-between; align-items:center; padding:14px 24px;
    border-bottom:1px solid var(--line); z-index:2; background:var(--bg)}
  .logo{font-weight:800; font-size:15px; text-decoration:none; color:var(--ink)}
  .logo b{color:var(--accent)}
  .tag2{font-size:12px; color:var(--dim)}
  main{flex:1; position:relative}
  canvas{display:block; width:100%; height:100%; touch-action:none; cursor:grab}
  canvas.grab{cursor:grabbing}
  .hud{position:absolute; left:0; right:0; bottom:14px; text-align:center; font-size:12.5px;
    color:rgba(40,30,14,.85); pointer-events:none; z-index:2; font-weight:600}
  .badge{position:absolute; top:14px; left:50%; transform:translateX(-50%); z-index:2;
    font-size:11px; letter-spacing:.18em; text-transform:uppercase; font-weight:700; color:#7a4a12;
    border:1px solid rgba(122,74,18,.4); background:rgba(255,244,224,.75); border-radius:999px; padding:5px 12px}
</style>
</head>
<body>
<nav>
  <a class="logo" href="index.html">Over<b>Core</b> <span class="tag2">· a sede · teste 02: chão PLANO, tudo pintado em textura</span></a>
  <span class="tag2">arraste pra orbitar · role pra aproximar</span>
</nav>
<main>
  <span class="badge">técnica do folio: geometria plana + pintura</span>
  <canvas id="cv" aria-label="chão plano da vila com córregos pintados"></canvas>
  <div class="hud">o chão é 100% plano — lago, margens e ladrilhos são pintura · espuma viaja nos córregos</div>
</main>

<script src="../agents/design/showcase/vendor/three.min.js"></script>
<script>
const reduced=matchMedia('(prefers-reduced-motion: reduce)').matches;
const cv=document.getElementById('cv');
let renderer;
try{ renderer=new THREE.WebGLRenderer({canvas:cv, antialias:true}) }
catch(e){ cv.replaceWith(Object.assign(document.createElement('p'),{textContent:'Sem WebGL — fica pra próxima.',style:'text-align:center;color:#8b93a7;padding:60px'})) }

if(renderer){
  const main=cv.parentElement;
  const W=()=>main.clientWidth, H=()=>main.clientHeight;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(W(),H(),false);
  renderer.setClearColor(0xf2c894);
  const scene=new THREE.Scene();
  scene.fog=new THREE.Fog(0xf2c894, 34, 85);
  const cam=new THREE.PerspectiveCamera(45, W()/H(), .1, 200);

  /* ===== mundo plano: 64×64, tudo desenhado numa textura 2048² ===== */
  const SIZE=64, RES=2048;
  const RIO=[[-34,-10],[-24,-6],[-14,-8],[-6,-4],[2,-1],[9,3],[16,4],[24,8],[34,13]];
  const AFLUENTE=[[-8,-34],[-6,-24],[-5,-16],[-3,-9],[0,-4],[2,-1]];
  const px=x=>(x+SIZE/2)/SIZE*RES, py=z=>(z+SIZE/2)/SIZE*RES;

  const tex=document.createElement('canvas'); tex.width=tex.height=RES;
  const g=tex.getContext('2d');

  // base quente (o piso do folio)
  const grad=g.createRadialGradient(RES/2,RES/2,RES*.12,RES/2,RES/2,RES*.72);
  grad.addColorStop(0,'#f2a35e'); grad.addColorStop(1,'#e88f4b');
  g.fillStyle=grad; g.fillRect(0,0,RES,RES);

  // ladrilhos em losango (sutil, como no print)
  g.save();
  g.translate(RES/2,RES/2); g.rotate(Math.PI/4); g.translate(-RES/2,-RES/2);
  const T=RES/26;
  for(let i=-6;i<32;i++)for(let j=-6;j<32;j++){
    const n=Math.sin(i*12.9898+j*78.233)*43758.5453;
    const f=n-Math.floor(n);
    if(f>.5){ g.fillStyle=`rgba(255,235,205,${(f-.5)*.10})` }
    else    { g.fillStyle=`rgba(120,60,20,${(.5-f)*.08})` }
    g.fillRect(i*T+1.5, j*T+1.5, T-3, T-3);
  }
  g.restore();

  // caminho helper
  function caminho(poly){
    g.beginPath();
    g.moveTo(px(poly[0][0]), py(poly[0][1]));
    for(let i=1;i<poly.length;i++){
      const [x0,z0]=poly[i-1], [x1,z1]=poly[i];
      g.quadraticCurveTo(px(x0),py(z0), px((x0+x1)/2), py((z0+z1)/2));
    }
    const u=poly[poly.length-1];
    g.lineTo(px(u[0]), py(u[1]));
    g.lineCap='round'; g.lineJoin='round';
  }
  function agua(poly, wWorld){
    const w=wWorld/SIZE*RES;
    // sombra da margem (transição suave pro chão)
    g.filter='blur(26px)';
    caminho(poly); g.strokeStyle='#b96b33'; g.lineWidth=w*1.55; g.stroke();
    // corpo d'água em 3 profundidades (borda clara → fundo escuro no meio)
    g.filter='blur(10px)';
    caminho(poly); g.strokeStyle='#3f9aa6'; g.lineWidth=w*1.06; g.stroke();
    g.filter='blur(6px)';
    caminho(poly); g.strokeStyle='#2e7f8d'; g.lineWidth=w*.78; g.stroke();
    caminho(poly); g.strokeStyle='#22626f'; g.lineWidth=w*.4; g.stroke();
    g.filter='none';
    // espuma da margem: risquinhos claros acompanhando a borda
    g.strokeStyle='rgba(250,238,214,.85)'; g.lineWidth=Math.max(3,w*.045);
    [-.5,.5].forEach(lado=>{
      g.save();
      g.setLineDash([w*.5, w*.55]);
      g.lineDashOffset=lado>0? w*.3 : 0;
      caminho(poly.map(([x,z],i)=>{
        // desloca a linha pro lado, com onda leve
        const j=Math.min(poly.length-2, Math.max(0,i));
        const [ax,az]=poly[j], [bx,bz]=poly[j+1];
        let tx=bx-ax, tz=bz-az; const tl=Math.hypot(tx,tz)||1; tx/=tl; tz/=tl;
        const o=wWorld*.42*lado + Math.sin(i*2.7)*.14;
        return [x-tz*o, z+tx*o];
      }));
      g.stroke();
      g.restore();
    });
  }
  agua(RIO, 3.0);
  agua(AFLUENTE, 2.1);

  // detalhinhos do piso (losangos vermelhos espalhados, como no folio)
  for(let i=0;i<26;i++){
    const n1=Math.sin(i*91.7)*43758.5453, n2=Math.sin(i*45.3)*24634.63;
    const fx=(n1-Math.floor(n1))*RES, fz=(n2-Math.floor(n2))*RES;
    // longe da água? (aprox: evita faixa central diagonal)
    g.save();
    g.translate(fx,fz); g.rotate(Math.PI/4);
    g.fillStyle=`rgba(150,40,30,${.25+(i%3)*.12})`;
    const s=7+(i%4)*4;
    g.fillRect(-s/2,-s/2,s,s);
    g.restore();
  }

  const texture=new THREE.CanvasTexture(tex);
  texture.anisotropy=8;
  const chao=new THREE.Mesh(
    new THREE.PlaneGeometry(SIZE,SIZE),
    new THREE.MeshBasicMaterial({map:texture}));   // basic = look "baked", sem depender de luz
  chao.rotation.x=-Math.PI/2;
  scene.add(chao);
  window.alturaTerreno=()=>0;                       // mundo plano: tudo senta em y=0

  /* ===== espuma viva viajando nos córregos ===== */
  function amostra(poly){
    const pts=[];
    for(let i=0;i<poly.length-1;i++){
      const [ax,az]=poly[i],[bx,bz]=poly[i+1];
      const n=Math.ceil(Math.hypot(bx-ax,bz-az)/.8);
      for(let s=0;s<n;s++){ const t=s/n; pts.push([ax+(bx-ax)*t, az+(bz-az)*t]) }
    }
    return pts;
  }
  function espuma(poly, qtd, wWorld){
    const pts=amostra(poly);
    const geo=new THREE.BufferGeometry();
    const pp=new Float32Array(qtd*3), prog=new Float32Array(qtd);
    for(let i=0;i<qtd;i++) prog[i]=Math.random();
    geo.setAttribute('position', new THREE.BufferAttribute(pp,3));
    scene.add(new THREE.Points(geo, new THREE.PointsMaterial({color:0xfaeed6, size:.16, transparent:true, opacity:.9})));
    return {geo,pp,prog,pts,wWorld};
  }
  const espumas=[espuma(RIO,40,3.0), espuma(AFLUENTE,22,2.1)];

  /* ===== câmera orbital ===== */
  let camA=.5, camEl=.62, camR=26, dragging=false, lx2=0, ly2=0;
  cv.addEventListener('pointerdown',e=>{dragging=true; lx2=e.clientX; ly2=e.clientY; cv.classList.add('grab')});
  window.addEventListener('pointermove',e=>{
    if(!dragging)return;
    camA+=(e.clientX-lx2)*.005; camEl=Math.min(1.3,Math.max(.2,camEl+(e.clientY-ly2)*.003));
    lx2=e.clientX; ly2=e.clientY;
  });
  window.addEventListener('pointerup',()=>{dragging=false; cv.classList.remove('grab')});
  cv.addEventListener('wheel',e=>{e.preventDefault(); camR=Math.min(48,Math.max(8,camR+e.deltaY*.02))},{passive:false});
  addEventListener('resize',()=>{cam.aspect=W()/H(); cam.updateProjectionMatrix(); renderer.setSize(W(),H(),false)});

  function frame(tms){
    const tt=tms*.001;
    if(!dragging && !reduced) camA+=.0009;
    cam.position.set(Math.sin(camA)*camR*Math.cos(camEl), Math.sin(camEl)*camR+1.5, Math.cos(camA)*camR*Math.cos(camEl));
    cam.lookAt(0,0,0);
    espumas.forEach(e=>{
      const m=e.pts.length;
      for(let i=0;i<e.prog.length;i++){
        if(!reduced) e.prog[i]=(e.prog[i]+.0012)%1;
        const f=e.prog[i]*(m-1), i0=Math.floor(f), t=f-i0;
        const p0=e.pts[i0], p1=e.pts[Math.min(m-1,i0+1)];
        const x=p0[0]+(p1[0]-p0[0])*t, z=p0[1]+(p1[1]-p0[1])*t;
        e.pp[i*3]=x+Math.sin(i*37.3)*e.wWorld*.18;
        e.pp[i*3+1]=.06;
        e.pp[i*3+2]=z+Math.cos(i*17.7)*e.wWorld*.15;
      }
      e.geo.attributes.position.needsUpdate=true;
    });
    renderer.render(scene,cam);
    if(!reduced) requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
}
</script>
</body>
</html>
